[package]
name = "horologion"
version = "0.0.1"
description = "Horologion"
authors = ["feuclalman@gmail.com"]
edition = "2021"
default-run = "horologion"

[lib]
name = "horologion_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[[bin]]
name = "input_listener"
path = "src/bin/input_listener.rs"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-opener = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
rdev = "0.4"
log = "0.4"
env_logger = "0.10"
tokio = { version = "1", features = ["process", "rt", "sync"] }

